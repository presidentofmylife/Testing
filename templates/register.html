{% extends "base.html" %}
{% block title %}إنشاء حساب | الرحيم{% endblock %}
{% block content %}
<section class="auth-shell" data-reveal>
  <div class="auth-showcase">
    <img src="{{ url_for('static', filename='images/r-logo.svg') }}" alt="شعار الرحيم بشكل جسم إنسان وعمود فقري" />
    <h1>ابدأ رحلتك العلاجية</h1>
    <p>سجّل حسابك كمراجع للوصول للحجز والدردشة مع الأخصائيين.</p>
  </div>

  <form class="auth-form" method="post">
    <h2>حساب جديد</h2>
    <label for="full_name">الاسم الكامل</label>
    <input id="full_name" name="full_name" type="text" required />

    <label for="username">اسم المستخدم</label>
    <input id="username" name="username" type="text" required />

    <label for="password">كلمة المرور</label>
    <input id="password" name="password" type="password" minlength="6" required />

    <button class="btn" type="submit">إنشاء الحساب</button>
    <p>لديك حساب؟ <a href="{{ url_for('login') }}">تسجيل الدخول</a></p>
  </form>
</section>
{% endblock %}
